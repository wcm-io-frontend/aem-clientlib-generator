name: Release and Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Type of release (e.g., patch, minor, major)
        required: true
        default: patch

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run test

  release-and-publish-npm-registry:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: set next version
        run: |
          git config user.name "GitHub Actions"
          git config user.email noreply@github.com
          npm version ${{ github.event.inputs.release_type }} -m "[npm] Release %s"
          git push
        shell: bash
  
      - run: npm ci
      - run: npm publish --provenance --access public

      - name: Read properties from package.json
        id: package_json
        uses: zoexx/github-action-json-file-properties@42c424cc2a0f9dfd36c79aedb70d429c0ae3e3fa # 1.0.7
        with:
          file_path: package.json

      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7
        with:
          disable-autolabeler: true
          name: ${{ steps.package_json.outputs.version }}
          tag: ${{ steps.package_json.outputs.version }}
          version: ${{ steps.package_json.outputs.version }}
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
